<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID BLOOM — Generative Art Toy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #08080f;
    --bg2: #0d0d1a;
    --ink: #f0ece0;
    --ink-dim: #7a7465;
    --accent: #4a9e8a;
    --accent2: #c46b3a;
    --accent3: #7b5ea7;
    --glow: rgba(74, 158, 138, 0.15);
    --panel: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 100;
  }

  /* CANVAS AREA — fullscreen */
  .canvas-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    overflow: hidden;
  }

  canvas {
    display: block;
    cursor: crosshair;
    touch-action: none;
  }

  .canvas-hint {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  /* ── FLOATING TOOLBAR ── */
  .toolbar {
    position: fixed;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(13,13,26,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 0.5rem 0.8rem;
    z-index: 50;
    box-shadow: 0 4px 40px rgba(0,0,0,0.6);
  }

  .toolbar-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* Mode tabs */
  .mode-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-dim);
    padding: 0.35rem 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 20px;
    white-space: nowrap;
  }

  .mode-btn:hover { color: var(--ink); background: rgba(255,255,255,0.05); }
  .mode-btn.active {
    background: rgba(74,158,138,0.15);
    border-color: rgba(74,158,138,0.4);
    color: var(--accent);
  }

  /* Swatches */
  .swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.active { border-color: var(--ink); box-shadow: 0 0 8px rgba(240,236,224,0.4); }

  /* Toolbar buttons */
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 0.35rem 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    border-radius: 4px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-accent {
    background: rgba(74,158,138,0.12);
    border-color: rgba(74,158,138,0.5);
    color: var(--accent);
  }
  .btn-accent:hover { background: rgba(74,158,138,0.25); }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.2s;
    text-decoration: none;
    flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--ink); background: rgba(255,255,255,0.05); }

  /* ── POPOVER PANELS ── */
  .popover {
    position: fixed;
    bottom: 4.2rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(13,13,26,0.95);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    z-index: 49;
    min-width: 280px;
    max-width: 360px;
    display: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    animation: popIn 0.15s ease;
  }
  .popover.open { display: block; }
  @keyframes popIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

  .section-label {
    font-size: 0.52rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 0.8rem;
  }

  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    margin-bottom: 0.7rem;
  }
  .slider-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    color: var(--ink-dim);
  }
  .slider-header span:last-child { color: var(--ink); }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    cursor: pointer;
  }

  .word-input-wrap { display: flex; gap: 0.4rem; }
  input[type=text] {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 0.45rem 0.6rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--ink-dim); }

  .word-tags {
    display: flex; flex-wrap: wrap; gap: 0.3rem;
    min-height: 20px; margin-top: 0.6rem;
  }
  .tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 0.75rem;
    color: var(--accent3);
    border: 1px solid rgba(123,94,167,0.3);
    padding: 0.1rem 0.4rem; border-radius: 2px;
    cursor: pointer;
  }

  .btn-full {
    width: 100%; padding: 0.55rem;
    margin-top: 0.7rem;
    background: rgba(74,158,138,0.1);
    border: 1px solid rgba(74,158,138,0.4);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em;
    cursor: pointer; border-radius: 4px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-full:hover { background: rgba(74,158,138,0.2); }

  .conjure-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 0.4rem; margin-top: 0.4rem;
  }

  hr { border: none; border-top: 1px solid var(--border); margin: 0.8rem 0; }


</style>
</head>
<body>

<audio id="bg-audio" loop>
  <source src="almost-human.mp3" type="audio/mpeg">
</audio>

<!-- Fullscreen canvas -->
<div class="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="canvas-hint" id="hint">click &amp; drag to paint</div>
</div>

<!-- Popovers -->
<div class="popover" id="popover-draw">
  <div class="section-label">Brush</div>
  <div class="slider-row">
    <div class="slider-header"><span>Size</span><span id="v-size">40</span></div>
    <input type="range" id="s-size" min="5" max="120" value="40">
  </div>
  <div class="slider-row">
    <div class="slider-header"><span>Tendrils</span><span id="v-tendrils">6</span></div>
    <input type="range" id="s-tendrils" min="1" max="16" value="6">
  </div>
  <div class="slider-row">
    <div class="slider-header"><span>Decay</span><span id="v-decay">0.92</span></div>
    <input type="range" id="s-decay" min="80" max="99" value="92">
  </div>
  <div class="slider-row">
    <div class="slider-header"><span>Twist</span><span id="v-twist">0.5</span></div>
    <input type="range" id="s-twist" min="0" max="100" value="50">
  </div>
</div>

<div class="popover" id="popover-sliders">
  <div class="section-label">Evolve Parameters</div>
  <div class="slider-row">
    <div class="slider-header"><span>Complexity</span><span id="v-complexity">5</span></div>
    <input type="range" id="s-complexity" min="1" max="12" value="5">
  </div>
  <div class="slider-row">
    <div class="slider-header"><span>Chaos</span><span id="v-chaos">30</span></div>
    <input type="range" id="s-chaos" min="0" max="100" value="30">
  </div>
  <div class="slider-row">
    <div class="slider-header"><span>Bloom</span><span id="v-bloom">50</span></div>
    <input type="range" id="s-bloom" min="0" max="100" value="50">
  </div>
  <div class="slider-row">
    <div class="slider-header"><span>Speed</span><span id="v-speed">3</span></div>
    <input type="range" id="s-speed" min="1" max="10" value="3">
  </div>
  <button class="btn-full" id="btn-evolve">▶ Evolve</button>
</div>

<div class="popover" id="popover-words">
  <div class="section-label">Words Shape the Void</div>
  <div class="word-input-wrap">
    <input type="text" id="word-input" placeholder="enter a word…" maxlength="30">
    <button class="btn" id="btn-add-word" style="border-radius:4px">+</button>
  </div>
  <div class="word-tags" id="word-tags"></div>
  <button class="btn-full" id="btn-bloom-words">✦ Bloom</button>
</div>

<div class="popover" id="popover-random">
  <div class="section-label">Instant Art</div>
  <button class="btn-full" id="btn-conjure">✦ Conjure</button>
  <div class="conjure-grid">
    <button class="btn" id="btn-conjure2" style="border-radius:4px">Wisp</button>
    <button class="btn" id="btn-conjure3" style="border-radius:4px">Storm</button>
    <button class="btn" id="btn-conjure4" style="border-radius:4px">Roots</button>
  </div>
</div>

<!-- Floating toolbar -->
<div class="toolbar">
  <button class="mode-btn active" data-mode="draw">🖱 Draw</button>
  <button class="mode-btn" data-mode="sliders">🎛 Sliders</button>
  <button class="mode-btn" data-mode="words">✍ Words</button>
  <button class="mode-btn" data-mode="random">🎲 Random</button>

  <div class="toolbar-sep"></div>

  <div class="swatch active" data-hue="teal" style="background:radial-gradient(circle at 30% 30%, #4a9e8a, #1a4a40)"></div>
  <div class="swatch" data-hue="amber" style="background:radial-gradient(circle at 30% 30%, #c46b3a, #5a2a10)"></div>
  <div class="swatch" data-hue="violet" style="background:radial-gradient(circle at 30% 30%, #7b5ea7, #2a1845)"></div>
  <div class="swatch" data-hue="rose" style="background:radial-gradient(circle at 30% 30%, #b05070, #4a1025)"></div>
  <div class="swatch" data-hue="ice" style="background:radial-gradient(circle at 30% 30%, #6ab0c8, #1a3848)"></div>
  <div class="swatch" data-hue="ghost" style="background:radial-gradient(circle at 30% 30%, #c8c0b0, #404030)"></div>

  <div class="toolbar-sep"></div>

  <button class="btn" id="btn-clear" style="border-radius:4px">Clear</button>
  <button class="btn btn-accent" id="btn-save" style="border-radius:4px">Save PNG</button>

  <div class="toolbar-sep"></div>

  <button class="btn-icon" id="btn-mute" title="Mute / Unmute">🔊</button>
  <a class="btn-icon" href="https://maximumreality.xyz" target="_blank" title="Home">🏡</a>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight);
  W = size; H = size;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0,0,W,H);
}
resize();
window.addEventListener('resize', resize);

// State
let mode = 'draw';
let hue = 'teal';
let isDrawing = false;
let evolveInterval = null;
let words = [];
let frameCount = 0;

// Hue palettes
const HUES = {
  teal:   [[30,180,150], [20,140,120], [60,200,160], [10,100,90]],
  amber:  [[200,100,50], [180,80,30],  [220,130,60], [150,60,20]],
  violet: [[140,100,200],[110,70,180], [160,120,210],[80,50,150]],
  rose:   [[190,80,120], [170,60,100], [210,100,140],[140,40,80]],
  ice:    [[100,180,210],[80,150,190], [120,200,220],[60,120,170]],
  ghost:  [[200,195,180],[180,175,160],[220,215,200],[150,145,130]],
};

function getColor(alpha=1, shift=0) {
  const palette = HUES[hue];
  const c = palette[(Math.floor(frameCount/30 + shift)) % palette.length];
  const jitter = () => (Math.random()-0.5)*30;
  return `rgba(${c[0]+jitter()},${c[1]+jitter()},${c[2]+jitter()},${alpha})`;
}

// ─── DRAW MODE ────────────────────────────────────────────────────
let lastX = -1, lastY = -1;

function drawTendrils(x, y, pressure=1) {
  const size = +document.getElementById('s-size').value * pressure;
  const tendrils = +document.getElementById('s-tendrils').value;
  const decay = +document.getElementById('s-decay').value / 100;
  const twist = +document.getElementById('s-twist').value / 100 * Math.PI;

  for (let i = 0; i < tendrils; i++) {
    const angle = (i / tendrils) * Math.PI * 2 + frameCount * 0.01 + twist;
    let cx = x, cy = y;
    let len = size * (0.5 + Math.random() * 0.5);
    let a = angle + (Math.random()-0.5)*0.8;

    ctx.beginPath();
    ctx.moveTo(cx, cy);

    let steps = Math.floor(len / 3);
    for (let s = 0; s < steps; s++) {
      const t = s / steps;
      const r = len * (1-t) * decay;
      a += (Math.random()-0.5) * 0.4;
      cx += Math.cos(a) * 3;
      cy += Math.sin(a) * 3;
      ctx.lineTo(cx, cy);
    }

    const alpha = 0.08 + Math.random()*0.15;
    ctx.strokeStyle = getColor(alpha, i);
    ctx.lineWidth = Math.max(0.3, (1-len/size*0.8) * 2);
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Center glow
  const g = ctx.createRadialGradient(x,y,0,x,y,size*0.3);
  const p = HUES[hue][0];
  g.addColorStop(0, `rgba(${p[0]},${p[1]},${p[2]},0.06)`);
  g.addColorStop(1, `rgba(${p[0]},${p[1]},${p[2]},0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x,y,size*0.3,0,Math.PI*2);
  ctx.fill();
}

canvas.addEventListener('mousedown', e => { isDrawing = true; hint.style.opacity = '0'; });
canvas.addEventListener('mouseup', () => { isDrawing = false; lastX=-1; lastY=-1; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; lastX=-1; lastY=-1; });
canvas.addEventListener('mousemove', e => {
  if (mode !== 'draw' || !isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const speed = lastX < 0 ? 1 : Math.hypot(x-lastX, y-lastY);
  const pressure = Math.min(1.5, 0.3 + speed * 0.04);
  drawTendrils(x, y, pressure);
  lastX = x; lastY = y;
  frameCount++;
});

canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; hint.style.opacity='0'; });
canvas.addEventListener('touchend', e => { e.preventDefault(); isDrawing = false; lastX=-1; lastY=-1; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (mode !== 'draw' || !isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;
  drawTendrils(x, y, 1);
  frameCount++;
});

// ─── SLIDERS / EVOLVE MODE ────────────────────────────────────────
function drawOrganicBlob(cx, cy, r, complexity, chaos, bloom) {
  const points = 6 + complexity * 2;
  const palette = HUES[hue];

  for (let layer = 0; layer < bloom/15 + 1; layer++) {
    const lr = r * (0.3 + layer * 0.25);
    ctx.beginPath();
    for (let i = 0; i <= points * 2; i++) {
      const t = i / (points * 2);
      const angle = t * Math.PI * 2;
      const noise = (Math.random()-0.5) * chaos * lr/100;
      const nr = lr + noise;
      const x = cx + Math.cos(angle) * nr;
      const y = cy + Math.sin(angle) * nr;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    const c = palette[layer % palette.length];
    ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.04 + Math.random()*0.06})`;
    ctx.lineWidth = 0.5 + Math.random();
    ctx.stroke();

    // Vein lines
    for (let v = 0; v < complexity; v++) {
      const a1 = Math.random()*Math.PI*2;
      const a2 = a1 + (Math.random()-0.5)*Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a1)*lr*0.2, cy + Math.sin(a1)*lr*0.2);
      const mx = cx + Math.cos((a1+a2)/2)*lr*(0.5+Math.random()*0.3);
      const my = cy + Math.sin((a1+a2)/2)*lr*(0.5+Math.random()*0.3);
      const ex = cx + Math.cos(a2)*lr*(0.8+Math.random()*0.2);
      const ey = cy + Math.sin(a2)*lr*(0.8+Math.random()*0.2);
      ctx.quadraticCurveTo(mx,my,ex,ey);
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.07)`;
      ctx.lineWidth = 0.3;
      ctx.stroke();
    }
  }
  frameCount++;
}

let evolveTimer = null;
document.getElementById('btn-evolve').addEventListener('click', () => {
  if (evolveTimer) { clearInterval(evolveTimer); evolveTimer = null; document.getElementById('btn-evolve').textContent = '▶ Evolve'; return; }
  document.getElementById('btn-evolve').textContent = '■ Stop';
  hint.style.opacity = '0';
  function step() {
    const complexity = +document.getElementById('s-complexity').value;
    const chaos = +document.getElementById('s-chaos').value;
    const bloom = +document.getElementById('s-bloom').value;
    const cx = W/2 + (Math.random()-0.5)*W*0.5;
    const cy = H/2 + (Math.random()-0.5)*H*0.4;
    const r = 30 + Math.random() * bloom * 2;
    drawOrganicBlob(cx, cy, r, complexity, chaos, bloom);
  }
  const speed = +document.getElementById('s-speed').value;
  evolveTimer = setInterval(step, Math.max(30, 300/speed));
});

// ─── WORDS MODE ───────────────────────────────────────────────────
document.getElementById('btn-add-word').addEventListener('click', addWord);
document.getElementById('word-input').addEventListener('keydown', e => { if(e.key==='Enter') addWord(); });

function addWord() {
  const inp = document.getElementById('word-input');
  const w = inp.value.trim();
  if (!w || words.length >= 8) return;
  words.push(w);
  inp.value = '';
  renderTags();
}

function renderTags() {
  const cont = document.getElementById('word-tags');
  cont.innerHTML = words.map((w,i) => `<span class="tag" data-i="${i}" style="cursor:pointer" title="remove">${w}</span>`).join('');
  cont.querySelectorAll('.tag').forEach(t => t.addEventListener('click', () => {
    words.splice(+t.dataset.i, 1); renderTags();
  }));
}

function wordToSeed(w) {
  return w.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
}

document.getElementById('btn-bloom-words').addEventListener('click', () => {
  if (!words.length) return;
  hint.style.opacity = '0';
  const palette = HUES[hue];

  words.forEach((word, wi) => {
    const seed = wordToSeed(word);
    const rng = (n=1) => ((Math.sin(seed * (n+1) * 12.9898) * 43758.5453) % 1 + 1) % 1;

    // Central point for this word
    const cx = W * (0.2 + rng(1) * 0.6);
    const cy = H * (0.2 + rng(2) * 0.6);
    const len = word.length;
    const branches = 3 + (seed % 7);
    const r = 40 + len * 8;

    // Draw organic structure seeded by the word
    for (let b = 0; b < branches; b++) {
      let x = cx, y = cy;
      let angle = (b / branches) * Math.PI * 2 + rng(b+10) * 0.5;
      const steps = 20 + len * 3;

      ctx.beginPath();
      ctx.moveTo(x,y);

      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        const charCode = word.charCodeAt(s % len) / 122;
        angle += (charCode - 0.5) * 0.4 + (rng(s+b*100)-0.5)*0.3;
        const step = (r / steps) * (1 - t*0.5);
        x += Math.cos(angle) * step;
        y += Math.sin(angle) * step;
        ctx.lineTo(x, y);

        // Leaf node
        if (s % Math.max(3, Math.floor(steps/len)) === 0) {
          const c = palette[(wi + b) % palette.length];
          ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.5)`;
          ctx.lineWidth = 1.5 * (1-t);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x,y);

          const nr = 2 + rng(s)*4;
          const g = ctx.createRadialGradient(x,y,0,x,y,nr);
          g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},0.4)`);
          g.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x,y,nr,0,Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(x,y);
        }
      }

      const c = palette[(wi+b)%palette.length];
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.15)`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Word label
    ctx.save();
    ctx.font = `italic 300 ${11 + len}px 'Cormorant Garamond', serif`;
    ctx.fillStyle = `rgba(240,236,224,0.18)`;
    ctx.fillText(word, cx - len*3, cy - r*0.8);
    ctx.restore();

    frameCount++;
  });
});

// ─── RANDOM MODE ──────────────────────────────────────────────────
function conjureRandom(style='normal') {
  hint.style.opacity = '0';
  const palette = HUES[hue];

  if (style === 'wisp') {
    // Drifting wisp trails
    for (let i = 0; i < 40; i++) {
      let x = Math.random()*W, y = Math.random()*H;
      let a = Math.random()*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(x,y);
      for (let s=0; s<80; s++) {
        a += (Math.random()-0.5)*0.4;
        x += Math.cos(a)*4; y += Math.sin(a)*3;
        ctx.lineTo(x,y);
      }
      const c = palette[i%palette.length];
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.04)`;
      ctx.lineWidth = 0.5 + Math.random();
      ctx.stroke();
    }
  } else if (style === 'storm') {
    // Radiating storm from center
    const cx = W/2, cy = H/2;
    for (let i=0; i<200; i++) {
      const a = Math.random()*Math.PI*2;
      const r = 20 + Math.random()*Math.max(W,H)*0.6;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      const ex = cx + Math.cos(a)*r + (Math.random()-0.5)*100;
      const ey = cy + Math.sin(a)*r + (Math.random()-0.5)*100;
      const mx = cx + Math.cos(a)*r*0.5 + (Math.random()-0.5)*80;
      const my = cy + Math.sin(a)*r*0.5 + (Math.random()-0.5)*80;
      ctx.quadraticCurveTo(mx,my,ex,ey);
      const c = palette[i%palette.length];
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.03+Math.random()*0.06})`;
      ctx.lineWidth = Math.random()*2;
      ctx.stroke();
    }
  } else if (style === 'roots') {
    // Branching root system
    function branch(x,y,a,len,depth) {
      if (depth<1||len<2) return;
      const ex = x+Math.cos(a)*len, ey = y+Math.sin(a)*len;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ex,ey);
      const c = palette[depth%palette.length];
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.1+depth*0.05})`;
      ctx.lineWidth = depth*0.5;
      ctx.stroke();
      branch(ex,ey, a+(Math.random()-0.5)*1.2, len*0.7, depth-1);
      branch(ex,ey, a+(Math.random()-0.5)*1.2, len*0.65, depth-1);
    }
    for(let i=0;i<5;i++) {
      branch(Math.random()*W, H*0.8+Math.random()*H*0.2, -Math.PI/2+(Math.random()-0.5)*0.5, 80+Math.random()*60, 8);
    }
  } else {
    // Normal: scattered organic blooms
    const n = 5 + Math.floor(Math.random()*8);
    for (let i=0; i<n; i++) {
      drawOrganicBlob(
        W*0.1+Math.random()*W*0.8,
        H*0.1+Math.random()*H*0.8,
        20+Math.random()*120,
        2+Math.floor(Math.random()*8),
        20+Math.random()*60,
        30+Math.random()*70
      );
    }
  }
  frameCount++;
}

document.getElementById('btn-conjure').addEventListener('click', () => conjureRandom('normal'));
document.getElementById('btn-conjure2').addEventListener('click', () => conjureRandom('wisp'));
document.getElementById('btn-conjure3').addEventListener('click', () => conjureRandom('storm'));
document.getElementById('btn-conjure4').addEventListener('click', () => conjureRandom('roots'));

// ─── MODE SWITCHING & POPOVERS ───────────────────────────────────
let activePopover = null;

function closeAllPopovers() {
  document.querySelectorAll('.popover').forEach(p => p.classList.remove('open'));
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const newMode = btn.dataset.mode;
    const popoverId = 'popover-' + newMode;
    const popover = document.getElementById(popoverId);

    if (evolveTimer && newMode !== 'sliders') {
      clearInterval(evolveTimer); evolveTimer=null;
      document.getElementById('btn-evolve').textContent='▶ Evolve';
    }

    if (mode === newMode && popover && popover.classList.contains('open')) {
      // Toggle off
      closeAllPopovers();
      activePopover = null;
    } else {
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      mode = newMode;
      closeAllPopovers();
      if (popover) { popover.classList.add('open'); activePopover = popover; }
      const hints = { draw:'click & drag to paint', sliders:'adjust sliders, then evolve', words:'type words, then bloom', random:'hit a button to conjure' };
      hint.style.opacity = '1';
      hint.textContent = hints[mode];
    }
  });
});

// Open draw panel by default
document.getElementById('popover-draw').classList.add('open');

// Close popovers on canvas click
document.getElementById('c').addEventListener('mousedown', () => { closeAllPopovers(); activePopover = null; });

// ─── PALETTE ──────────────────────────────────────────────────────
document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
    hue = s.dataset.hue;
  });
});

// ─── SLIDER LABELS ────────────────────────────────────────────────
[['s-size','v-size',1],['s-tendrils','v-tendrils',1],['s-decay','v-decay',0.01],
 ['s-twist','v-twist',0.01],['s-complexity','v-complexity',1],['s-chaos','v-chaos',1],
 ['s-bloom','v-bloom',1],['s-speed','v-speed',1]].forEach(([sid,vid,scale]) => {
  const el = document.getElementById(sid);
  if (!el) return;
  const update = () => document.getElementById(vid).textContent = (el.value*scale).toFixed(scale<1?2:0);
  el.addEventListener('input', update);
  update();
});

// ─── CLEAR / SAVE ─────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0,0,W,H);
  hint.style.opacity='1';
  if (evolveTimer) { clearInterval(evolveTimer); evolveTimer=null; document.getElementById('btn-evolve').textContent='▶ Evolve'; }
});

document.getElementById('btn-save').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'void-bloom.png';
  a.href = canvas.toDataURL();
  a.click();
});
// ─── AUDIO ────────────────────────────────────────────────────────
const audio = document.getElementById('bg-audio');
const muteBtn = document.getElementById('btn-mute');
let muted = false;

// Autoplay on first interaction
let audioStarted = false;
function startAudio() {
  if (!audioStarted) {
    audio.volume = 0.5;
    audio.play().catch(() => {});
    audioStarted = true;
  }
}
document.addEventListener('mousedown', startAudio, { once: true });
document.addEventListener('touchstart', startAudio, { once: true });

muteBtn.addEventListener('click', () => {
  muted = !muted;
  audio.muted = muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
});
</script>
